sensitive_files:
  - ".env"
  - ".env.*"
  - "*.pem"
  - "*.key"
  - "id_rsa"
  - "id_ed25519"
  - ".npmrc"
  - ".pypirc"
  - ".aws/credentials"
  - ".docker/config.json"
  - ".kube/config"
  - "credentials.json"
  - "secrets.yml"

generated_or_local_dirs:
  - "target/**"
  - "build/**"
  - "dist/**"
  - "node_modules/**"
  - ".m2home/**"
  - ".idea/**"

protected_system_write_paths:
  - "/etc/**"
  - "/usr/**"
  - "/bin/**"
  - "/sbin/**"
  - "/boot/**"
  - "/proc/**"
  - "/sys/**"
