risk_levels:
  LOW:
    - "src/**"
    - "test/**"
    - "docs/**"

  MEDIUM:
    - "scripts/**"
    - "prompts/**"
    - "docs/policies/**"
    - "AGENTS.md"
    - "CLAUDE.md"
    - "GEMINI.md"
    - ".cursor/**"
    - ".roo/**"
    - ".windsurfrules"
    - ".clinerules"
    - ".github/copilot-instructions.md"

  HIGH:
    - "pom.xml"
    - "package.json"
    - "pnpm-lock.yaml"
    - "Dockerfile"
    - ".github/workflows/**"
    - ".gitcode/workflows/**"
    - "src/main/resources/application*.yml"
    - "db/migration/**"

  CRITICAL:
    - ".env"
    - ".env.*"
    - "*.pem"
    - "*.key"
    - "id_rsa"
    - "id_ed25519"
