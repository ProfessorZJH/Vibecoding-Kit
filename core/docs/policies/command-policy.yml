allowed_read_only:
  - "git status"
  - "git diff"
  - "git log"
  - "ls"
  - "find"
  - "rg"
  - "grep"
  - "cat"
  - "head"
  - "tail"

allowed_test_commands:
  - "mvn test"
  - "mvn -q test"
  - "npm test"
  - "pnpm test"
  - "pytest"
  - "go test"

requires_approval:
  - "npm install"
  - "pnpm install"
  - "yarn install"
  - "mvn clean package"
  - "docker compose up"
  - "docker build"

forbidden_patterns:
  - "curl .*\\| *(bash|sh)"
  - "wget .*\\| *(bash|sh)"
  - "rm -rf /"
  - "sudo "
  - "chmod 777"
  - "cat .env"
  - "cat ~/.ssh/"
  - "cat ~/.aws/credentials"
  - "ssh "
  - "scp "
