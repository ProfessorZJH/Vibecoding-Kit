name: AI Guard

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  ai-guard:
    runs-on: euleros-2.10.1
    steps:
      - name: Checkout
        uses: checkout-action@0.0.1

      - name: Setup Java
        uses: setup-java@0.0.2
        with:
          java-version: "17"

      - name: Setup Node
        uses: setup-node@0.0.1
        with:
          node-version: "20"

      - name: AI Guard Scripts
        run: |
          bash scripts/test-ai-guards.sh
          bash scripts/drift-guard.sh
          git diff --check

      - name: Backend Tests
        run: |
          if [ -f pom.xml ]; then mvn test; fi

      - name: Frontend Build
        run: |
          if [ -f package.json ]; then npm ci && npm run build; fi
          if [ -f frontend/package.json ]; then cd frontend && npm ci && npm run build; fi
