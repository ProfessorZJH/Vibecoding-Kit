name: AI Guard

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  ai-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: AI Guard Scripts
        run: |
          bash scripts/test-ai-guards.sh
          bash scripts/drift-guard.sh
          git diff --check

      - name: Backend Tests
        run: |
          if [ -f pom.xml ]; then mvn test; fi

      - name: Frontend Build
        run: |
          if [ -f package.json ]; then npm ci && npm run build; fi
          if [ -f frontend/package.json ]; then cd frontend && npm ci && npm run build; fi
